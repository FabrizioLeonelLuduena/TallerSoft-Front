<div class="modal-overlay" *ngIf="isOpen" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="header-info">
        <h2>Editar Usuario</h2>
        <p *ngIf="usuario">{{ usuario.nombre }}</p>
      </div>
      <button class="btn-close" type="button" (click)="onCancel()" [disabled]="loading">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form [formGroup]="form" class="modal-form" (ngSubmit)="onSubmit()">

      <!-- Nombre -->
      <div class="form-field">
        <label>Nombre completo <span class="required">*</span></label>
        <input
          type="text"
          class="ts-input"
          formControlName="nombre"
          placeholder="Ej: Juan Pérez"
          [class.error]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
        />
        <span class="error-text" *ngIf="form.get('nombre')?.hasError('required') && form.get('nombre')?.touched">
          El nombre es requerido
        </span>
      </div>

      <!-- Email -->
      <div class="form-field">
        <label>Email <span class="required">*</span></label>
        <input
          type="email"
          class="ts-input"
          formControlName="email"
          placeholder="correo@ejemplo.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          {{ getEmailError() }}
        </span>
      </div>

      <!-- Password (opcional) -->
      <div class="form-field">
        <label>Nueva contraseña <span class="optional">(opcional)</span></label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="ts-input"
            formControlName="password"
            placeholder="Dejá vacío para no cambiar"
            [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <span class="error-text" *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched">
          Mínimo 8 caracteres
        </span>
      </div>

      <!-- Rol -->
      <div class="form-field">
        <label>Rol <span class="required">*</span></label>
        <div class="role-selector">
          <div class="role-card" [class.role-card-selected]="selectedRole === 'ADMIN'" (click)="selectRole('ADMIN')" role="button" tabindex="0">
            <div class="role-icon">
              <mat-icon>security</mat-icon>
            </div>
            <div class="role-content">
              <p class="role-name">Admin</p>
              <p class="role-desc">Control total del sistema</p>
            </div>
          </div>
          <div class="role-card" [class.role-card-selected]="selectedRole === 'TECNICO'" (click)="selectRole('TECNICO')" role="button" tabindex="0">
            <div class="role-icon">
              <mat-icon>build</mat-icon>
            </div>
            <div class="role-content">
              <p class="role-name">Técnico</p>
              <p class="role-desc">Acceso a órdenes e inventario</p>
            </div>
          </div>
          <div class="role-card" [class.role-card-selected]="selectedRole === 'RECEPCION'" (click)="selectRole('RECEPCION')" role="button" tabindex="0">
            <div class="role-icon">
              <mat-icon>support_agent</mat-icon>
            </div>
            <div class="role-content">
              <p class="role-name">Recepción</p>
              <p class="role-desc">Gestión de ingreso de clientes</p>
            </div>
          </div>
        </div>
        <span class="error-text" *ngIf="form.get('rol')?.invalid && form.get('rol')?.touched">
          Debe seleccionar un rol
        </span>
      </div>

      <!-- Acciones -->
      <div class="modal-actions">
        <button class="btn-cancel" type="button" (click)="onCancel()" [disabled]="loading">
          Cancelar
        </button>
        <button class="btn-save" type="submit" [disabled]="loading || form.invalid">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          <mat-icon *ngIf="!loading">edit</mat-icon>
          {{ loading ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>

    </form>
  </div>
</div>
