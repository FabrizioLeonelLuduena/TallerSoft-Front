<div class="login-wrapper">
  <!-- Decorative background -->
  <div class="login-background"></div>

  <!-- Main Content -->
  <main class="login-container">
    <!-- Logo Section -->
    <div class="login-logo-section">
      <div class="logo-icon">
        <span class="material-symbols-outlined">build</span>
      </div>
      <h1 class="logo-title">TallerSoft</h1>
      <p class="logo-subtitle">Sistema de Gestión ERP</p>
    </div>

    <!-- Login Card -->
    <div class="ts-card login-card">
      <!-- Decorative atmospheric glow -->
      <div class="card-glow"></div>

      <div class="card-content">
        <!-- Header -->
        <header class="card-header">
          <h2 class="card-title">Bienvenido</h2>
          <p class="card-description">Inicie sesión para acceder al panel de control.</p>
        </header>

        <!-- Error Alert -->
        <div *ngIf="errorMessage" class="error-alert" role="alert">
          <span class="material-symbols-outlined">error</span>
          <span class="error-text">{{ errorMessage }}</span>
        </div>

        <!-- Form -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <!-- Email Field -->
          <div class="form-group">
            <label class="form-label" for="email">Correo Electrónico</label>
            <div class="form-input-wrapper">
              <span class="input-icon">
                <span class="material-symbols-outlined">mail</span>
              </span>
              <input
                id="email"
                type="email"
                class="ts-input"
                formControlName="email"
                placeholder="admin@tallersoft.com"
                autocomplete="email"
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <div class="form-input-wrapper">
              <span class="input-icon">
                <span class="material-symbols-outlined">lock</span>
              </span>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                class="ts-input"
                formControlName="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="togglePasswordVisibility()"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              >
                <span class="material-symbols-outlined">
                  {{ showPassword ? 'visibility_off' : 'visibility' }}
                </span>
              </button>
            </div>
          </div>

          <!-- Remember Session Checkbox -->
          <div class="form-checkbox">
            <input type="checkbox" id="remember" />
            <label for="remember" class="checkbox-label">Recordar sesión</label>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="ts-btn-primary login-button"
            [disabled]="loginForm.invalid || loading"
          >
            <span *ngIf="!loading" class="button-text">
              INGRESAR
              <span class="material-symbols-outlined">arrow_forward</span>
            </span>
            <span *ngIf="loading" class="button-loading">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </span>
          </button>
        </form>

        <!-- Footer -->
        <footer class="card-footer">
          <p class="footer-text">
            ¿No tiene una cuenta?
            <span class="footer-link">Contactar Soporte</span>
          </p>
        </footer>
      </div>
    </div>

    <!-- System Status -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot"></span>
        <span class="status-text">SERVIDOR: ONLINE</span>
      </div>
      <div class="status-divider"></div>
      <span class="status-text">v2.4.0-STABLE</span>
    </div>
  </main>
</div>
