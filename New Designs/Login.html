<!DOCTYPE html>

                    "on-primary-fixed-variant": "#005144",
                    "primary-fixed": "#26fedc",
                    "on-primary-fixed": "#00201a",
                    "tertiary-fixed-dim": "#accae2",
                    "tertiary-container": "#c0def6",
                    "surface-container-highest": "#2f3445",
                    "on-tertiary-fixed-variant": "#2d4a5e",
                    "on-tertiary-container": "#466277",
                    "surface": "#0e1322",
                    "on-secondary-fixed": "#121d21",
                    "surface-container": "#1a1f2f",

<style>
        body {
            background-color: #0A0F1E;
            background-image: 
                linear-gradient(rgba(222, 225, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(222, 225, 247, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            font-family: 'Inter', sans-serif;
        }

        .ts-card {
            background: rgba(22, 27, 43, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(222, 225, 247, 0.08);
            border-radius: 12px;
        }

        .ts-input {
            background: rgba(9, 14, 28, 0.6);
            border: 1px solid rgba(222, 225, 247, 0.08);
            color: #dee1f7;
            transition: all 0.2s ease-in-out;
        }

        .ts-input:focus {
            outline: none;
            border-color: #00F5D4;
            box-shadow: 0 0 0 1px rgba(0, 245, 212, 0.2);
        }

        .ts-btn-primary {
            background-color: #00F5D4;
            color: #0A0F1E;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .ts-btn-primary:hover {
            opacity: 0.9;
        }

        .ts-btn-primary:active {
            transform: scale(0.98);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter">
<main class="w-full max-w-[400px] animate-in fade-in zoom-in duration-500">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-container text-[32px]" data-icon="build" style="font-variation-settings: 'FILL' 1;">build</span>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tighter">TallerSoft</h1>
</div>
<p class="font-label-md text-label-md text-secondary mt-xs uppercase tracking-[0.2em]">SISTEMA DE GESTIÓN ERP</p>
</div>
<!-- Login Card -->
<div class="ts-card p-lg shadow-2xl relative overflow-hidden">
<!-- Subtle atmospheric glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-container/5 blur-[64px] rounded-full"></div>
<div class="relative z-10">
<header class="mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Bienvenido</h2>
<p class="font-body-sm text-body-sm text-secondary mt-xs">Inicie sesión para acceder al panel de control.</p>
</header>
<form action="#" class="space-y-md" method="POST">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-secondary text-[20px]" data-icon="mail">mail</span>
<input class="ts-input w-full px-xl py-sm rounded-lg font-body-md text-body-md placeholder:text-secondary/30" id="email" name="email" placeholder="admin@tallersoft.com" required="" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-primary-container hover:underline" href="#">¿Olvidó su contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-secondary text-[20px]" data-icon="lock">lock</span>
<input class="ts-input w-full px-xl py-sm rounded-lg font-body-md text-body-md placeholder:text-secondary/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center gap-sm py-xs">
<input class="w-4 h-4 rounded border-white/10 bg-surface-container text-primary-container focus:ring-primary-container/20" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-secondary cursor-pointer" for="remember">Recordar sesión</label>
</div>
<button class="ts-btn-primary w-full py-md rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm mt-lg" type="submit">
<span>INGRESAR</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<footer class="mt-xl pt-lg border-t border-white/5 text-center">
<p class="font-body-sm text-body-sm text-secondary">
                        ¿No tiene una cuenta? 
                        <a class="text-primary-container font-semibold hover:underline" href="#">Contactar Soporte</a>
</p>
</footer>
</div>
</div>
<!-- System Status -->
<div class="mt-lg flex items-center justify-center gap-md">
<div class="flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-[#00F5D4] animate-pulse"></span>
<span class="font-label-sm text-label-sm text-secondary">SERVIDOR: ONLINE</span>
</div>
<div class="w-px h-3 bg-white/10"></div>
<span class="font-label-sm text-label-sm text-secondary">v2.4.0-STABLE</span>
</div>
</main>
<!-- Decorative Elements (Heads-up display style) -->
<div class="fixed top-gutter left-gutter opacity-20 pointer-events-none hidden md:block">
<div class="font-label-sm text-label-sm text-secondary flex flex-col gap-xs">
<span>SECURE_NODE: 402.AF</span>
<span>ENCRYPTION: AES-256</span>
</div>
</div>
<div class="fixed bottom-gutter right-gutter opacity-20 pointer-events-none hidden md:block text-right">
<div class="font-label-sm text-label-sm text-secondary flex flex-col gap-xs">
<span>LOCATION: TERMINAL_01</span>
<span id="clock">00:00:00</span>
</div>
</div>
<script>
        // Simple clock micro-interaction
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0') + ':' + 
                           now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            document.querySelector('main').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body></html>
